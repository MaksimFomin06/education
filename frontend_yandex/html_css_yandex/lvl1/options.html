<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Опрос: Ваши хобби</title>
  </head>
  <body>
    <h2>Какие у вас хобби? (можно выбрать несколько)</h2>
    <form>
      <input
        type="checkbox"
        name="hobby_reading"
        value="reading"
        id="reading"
      />
      <label for="reading">Чтение</label>
      <input
        type="checkbox"
        name="hobby_sport"
        value="sport"
        id="sport"
        checked
      />
      <label for="sport">Спорт</label>
      <input type="checkbox" name="hobby_music" value="music" id="music" />
      <label for="music">Музыка</label>
      <button type="submit">Сохранить выбор</button>
    </form>
  </body>
</html>
