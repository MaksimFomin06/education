<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Опрос: Любимый цвет</title>
  </head>
  <body>
    <h2>Какой ваш любимый цвет?</h2>
    <form>
      <input type="radio" name="favorite_color" id="red" value="red" />
      <label for="red">Красный</label>
      <input
        type="radio"
        name="favorite_color"
        id="green"
        value="green"
        checked
      />
      <label for="green">Зеленый</label>
      <input type="radio" name="favorite_color" id="blue" value="blue" />
      <label for="blue">Синий</label>
      <button type="submit">Проголосовать</button>
    </form>
  </body>
</html>
